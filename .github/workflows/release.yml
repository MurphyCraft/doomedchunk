name: Build and Release

# Push a tag like v1.1.0 to build the mod and publish a GitHub Release
# with the jar(s) attached. The mod version is taken from the tag itself
# (the leading "v" is stripped) and passed to Gradle as -Pmod_version, so
# you do NOT need to bump mod_version in gradle.properties before tagging.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [ -z "$VERSION" ]; then
            echo "::error::Tag '${GITHUB_REF_NAME}' produced an empty version after stripping 'v'."
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building mod version: $VERSION (from tag $GITHUB_REF_NAME)"

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Build with Gradle
        run: |
          chmod +x ./gradlew
          ./gradlew build --no-daemon --stacktrace \
            -Pmod_version=${{ steps.version.outputs.version }}

      - name: List built artifacts
        run: ls -lh build/libs

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: doomedchunks-${{ steps.version.outputs.version }}
          path: build/libs/*.jar
          if-no-files-found: error
          retention-days: 90

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Doomed Chunks ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: build/libs/*.jar
