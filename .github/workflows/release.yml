name: Build and Release

# Push a tag like v1.1.0 to build the mod and publish a GitHub Release
# with the jar(s) attached. The version baked into the jar comes from
# `mod_version` in gradle.properties — keep it in sync with the tag.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Build with Gradle
        run: |
          chmod +x ./gradlew
          ./gradlew build --no-daemon --stacktrace

      - name: List built artifacts
        run: ls -lh build/libs

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: doomedchunks-${{ github.ref_name }}
          path: build/libs/*.jar
          if-no-files-found: error
          retention-days: 90

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Doomed Chunks ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: build/libs/*.jar
